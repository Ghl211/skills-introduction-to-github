<svg viewBox="0 0 920 620" xmlns="http://www.w3.org/2000/svg" style="background:#020617; font-family: 'JetBrains Mono', 'Courier New', monospace;">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185"/>
    </marker>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="920" height="620" fill="url(#grid)"/>

  <!-- ===== ARROWS ===== -->
  <line x1="100" y1="93" x2="100" y2="150" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" stroke-dasharray="4,3"/>
  <text x="55" y="125" fill="#64748b" font-size="8">user starts</text>
  <text x="55" y="136" fill="#64748b" font-size="8">session</text>

  <line x1="460" y1="186" x2="460" y2="240" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)"/>
  <text x="475" y="218" fill="#34d399" font-size="8" font-weight="500">PASS →</text>

  <line x1="460" y1="330" x2="460" y2="390" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)"/>
  <text x="475" y="365" fill="#34d399" font-size="8" font-weight="500">PASS →</text>

  <path d="M 720 420 Q 800 460 800 500" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-rose)"/>
  <text x="808" y="470" fill="#fb7185" font-size="8">correction</text>
  <text x="808" y="482" fill="#64748b" font-size="7">"put it in hot"</text>

  <path d="M 800 540 Q 800 570 460 570 L 460 540" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-violet)"/>
  <text x="580" y="582" fill="#a78bfa" font-size="8">next session loads updated rules</text>

  <!-- ===== OUTER RING ===== -->
  <rect x="30" y="30" width="860" height="166" rx="10" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="40" y="52" fill="#22d3ee" font-size="10" font-weight="600">🛡️ OUTER RING · Shell Gate</text>
  <text x="40" y="66" fill="#64748b" font-size="8">Zero-token, enforced before AI speaks · Bypass-proof: ★★★★★</text>

  <rect x="60" y="80" width="180" height="90" rx="6" fill="rgba(8, 51, 68, 0.6)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="75" y="100" fill="#22d3ee" font-size="10" font-weight="600">pre-session-check.sh</text>
  <text x="75" y="118" fill="#94a3b8" font-size="8">$ date '+%Y-%m-%d %H:%M'</text>
  <text x="75" y="133" fill="#94a3b8" font-size="8">$ hermes gateway status</text>
  <line x1="75" y1="141" x2="220" y2="141" stroke="#1e293b" stroke-width="1"/>
  <text x="75" y="155" fill="#34d399" font-size="8">✅ PASS → start session</text>
  <text x="75" y="168" fill="#fb7185" font-size="8">❌ FAIL → session refused</text>

  <rect x="290" y="80" width="160" height="42" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="305" y="98" fill="#22d3ee" font-size="9">🌐 Gateway status check</text>
  <text x="305" y="113" fill="#64748b" font-size="8">Auto-start if offline</text>

  <rect x="290" y="132" width="160" height="38" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="305" y="150" fill="#22d3ee" font-size="9">⏰ Time check</text>
  <text x="305" y="164" fill="#64748b" font-size="8">Before every response</text>

  <rect x="500" y="80" width="180" height="90" rx="6" fill="rgba(136, 19, 55, 0.3)" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="515" y="100" fill="#fb7185" font-size="9" font-weight="600">🔒 Cannot Bypass</text>
  <text x="515" y="118" fill="#94a3b8" font-size="8">Shell-level enforcement</text>
  <text x="515" y="133" fill="#94a3b8" font-size="8">No AI involvement needed</text>
  <text x="515" y="148" fill="#94a3b8" font-size="8">Fail → process exits</text>
  <text x="515" y="168" fill="#64748b" font-size="7">Infrastructure level · 0 tokens</text>

  <!-- ===== INNER RING ===== -->
  <rect x="30" y="230" width="860" height="136" rx="10" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="40" y="252" fill="#34d399" font-size="10" font-weight="600">🔴 INNER RING · Prompt Gate</text>
  <text x="40" y="266" fill="#64748b" font-size="8">Pinned in SOUL.md, injected every session · ~50 tokens</text>

  <rect x="60" y="278" width="400" height="72" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="75" y="296" fill="#34d399" font-size="9" font-weight="600">SOUL.md · Auto-injected</text>
  <text x="75" y="314" fill="#94a3b8" font-size="8">## 🔴 Dual-Ring Gate · Inner Ring</text>
  <text x="75" y="329" fill="#64748b" font-size="8">- terminal('date') before every response</text>
  <text x="75" y="342" fill="#64748b" font-size="8">- Verify gateway on first response</text>
  <text x="75" y="355" fill="#64748b" font-size="8">- Update error DB after every fix</text>

  <rect x="500" y="278" width="180" height="72" rx="6" fill="rgba(136, 19, 55, 0.3)" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="515" y="296" fill="#fb7185" font-size="9" font-weight="600">🔒 Cannot Delete</text>
  <text x="515" y="314" fill="#94a3b8" font-size="8">AI can ignore in thought</text>
  <text x="515" y="329" fill="#94a3b8" font-size="8">but cannot remove the</text>
  <text x="515" y="344" fill="#94a3b8" font-size="8">SOUL.md carrier file</text>

  <!-- ===== AGENT ===== -->
  <rect x="310" y="390" width="300" height="50" rx="8" fill="rgba(30, 41, 59, 0.6)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="360" y="412" fill="#e2e8f0" font-size="11" font-weight="600">🤖 Hermes Agent</text>
  <text x="340" y="430" fill="#64748b" font-size="8">Self-check before every action</text>

  <!-- ===== LIFECYCLE ===== -->
  <rect x="520" y="390" width="360" height="180" rx="10" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="530" y="412" fill="#a78bfa" font-size="10" font-weight="600">📊 RULE LIFECYCLE · Hot → Warm → Cold → Retire</text>

  <rect x="540" y="425" width="75" height="55" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="552" y="445" fill="#fb923c" font-size="14" font-weight="700">🔥</text>
  <text x="544" y="465" fill="#e2e8f0" font-size="9" font-weight="500">Hot</text>
  <text x="540" y="475" fill="#64748b" font-size="7">≤3 days</text>

  <text x="622" y="455" fill="#64748b" font-size="12">→</text>

  <rect x="640" y="425" width="75" height="55" rx="6" fill="rgba(148, 163, 184, 0.2)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="652" y="445" fill="#94a3b8" font-size="14" font-weight="700">🌤</text>
  <text x="644" y="465" fill="#e2e8f0" font-size="9" font-weight="500">Warm</text>
  <text x="640" y="475" fill="#64748b" font-size="7">Recurr ≥2</text>

  <text x="722" y="455" fill="#64748b" font-size="12">→</text>

  <rect x="740" y="425" width="60" height="55" rx="6" fill="rgba(148, 163, 184, 0.15)" stroke="#64748b" stroke-width="1"/>
  <text x="750" y="445" fill="#64748b" font-size="14" font-weight="700">❄️</text>
  <text x="744" y="465" fill="#94a3b8" font-size="9" font-weight="500">Cold</text>
  <text x="740" y="475" fill="#475569" font-size="7">7d+</text>

  <rect x="740" y="490" width="60" height="35" rx="6" fill="rgba(148, 163, 184, 0.08)" stroke="#475569" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="744" y="510" fill="#64748b" font-size="8">🗑️ Retire</text>
  <text x="744" y="521" fill="#475569" font-size="7">30d → arch</text>

  <path d="M 770 490 Q 770 510 700 510 Q 640 510 640 485" fill="none" stroke="#fb7185" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrow-rose)"/>
  <text x="700" y="522" fill="#fb7185" font-size="7">Penalty Bounce</text>

  <!-- ===== MANUAL CORRECTION ===== -->
  <rect x="30" y="390" width="250" height="80" rx="8" fill="rgba(136, 19, 55, 0.2)" stroke="#fb7185" stroke-width="1"/>
  <text x="45" y="412" fill="#fb7185" font-size="9" font-weight="600">💬 Manual Correction</text>
  <text x="45" y="432" fill="#94a3b8" font-size="9">"I keep forgetting to check</text>
  <text x="45" y="447" fill="#94a3b8" font-size="9">the time. Put it in hot."</text>
  <line x1="45" y1="458" x2="265" y2="458" stroke="#1e293b" stroke-width="1"/>
  <text x="45" y="472" fill="#64748b" font-size="8">No external dependency needed</text>

  <rect x="30" y="480" width="250" height="55" rx="8" fill="rgba(76, 29, 149, 0.2)" stroke="#a78bfa" stroke-width="1"/>
  <text x="45" y="500" fill="#a78bfa" font-size="9" font-weight="600">🔄 Review Agent Integration</text>
  <text x="45" y="518" fill="#94a3b8" font-size="9">Auto-scan → Extract → Sort → Update</text>
  <text x="45" y="532" fill="#64748b" font-size="7">Optional advanced mode</text>
</svg>
